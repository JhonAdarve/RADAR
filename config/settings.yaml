project:

  name: "RADAR Cibest"
  version: "1.0.0"
  description: >
    Sistema analitico multicriterio hibrido para evaluar el atractivo de
    mercados de America y Espana como destinos de internacionalizacion de
    Grupo Cibest, generando senales diferenciadas para las cinco lineas
    de negocio.
  methodology: "BWM + TOPSIS + Gravitacional"
  dimensions:
    - macro
    - financial
    - institutional
    - digital_tech
    - proximity

countries:
  - { iso3: "ARG", name: "Argentina",            region: "south_america" }
  - { iso3: "BOL", name: "Bolivia",              region: "south_america" }
  - { iso3: "BRA", name: "Brasil",               region: "south_america" }
  - { iso3: "CHL", name: "Chile",                region: "south_america" }
  - { iso3: "COL", name: "Colombia",             region: "south_america" }
  - { iso3: "ECU", name: "Ecuador",              region: "south_america" }
  - { iso3: "GUY", name: "Guyana",               region: "south_america" }
  - { iso3: "PRY", name: "Paraguay",             region: "south_america" }
  - { iso3: "PER", name: "Peru",                 region: "south_america" }
  - { iso3: "SUR", name: "Surinam",              region: "south_america" }
  - { iso3: "URY", name: "Uruguay",              region: "south_america" }
  - { iso3: "VEN", name: "Venezuela",            region: "south_america" }
  - { iso3: "BLZ", name: "Belice",               region: "central_america" }
  - { iso3: "CRI", name: "Costa Rica",           region: "central_america" }
  - { iso3: "SLV", name: "El Salvador",          region: "central_america" }
  - { iso3: "GTM", name: "Guatemala",            region: "central_america" }
  - { iso3: "HND", name: "Honduras",             region: "central_america" }
  - { iso3: "NIC", name: "Nicaragua",            region: "central_america" }
  - { iso3: "PAN", name: "Panama",               region: "central_america" }
  - { iso3: "CAN", name: "Canada",               region: "north_america" }
  - { iso3: "MEX", name: "Mexico",               region: "north_america" }
  - { iso3: "USA", name: "Estados Unidos",       region: "north_america" }
  - { iso3: "CUB", name: "Cuba",                 region: "caribbean" }
  - { iso3: "DOM", name: "Republica Dominicana", region: "caribbean" }
  - { iso3: "HTI", name: "Haiti",                region: "caribbean" }
  - { iso3: "JAM", name: "Jamaica",              region: "caribbean" }
