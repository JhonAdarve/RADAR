        secure_internet_servers_per_million: 0.05
        ict_goods_exports_pct_total_goods_exports: 0.04

    key_variables:
      positive_signal:
        - digital_payment_adults_pct
        - personal_remittances_gdp
        - trade_openness
        - account_ownership
        - mobile_subscriptions
        - atms_per_100k_adults
        - commercial_bank_branches_per_100k_adults
        - current_account_gdp
        - interest_rate_spread

      negative_signal:
        - country_risk_premium
        - inflation_rate
        - weighted_mean_applied_tariff_all_products
        - bank_npl_ratio
        - public_debt_gdp

    signal_logic: La atractividad para Pagos y Flujos se explica por la intensidad transaccional del mercado, la adopcion efectiva de pagos digitales, la conectividad movil, el peso de remesas, la apertura de flujos transfronterizos y la disponibilidad de canales transaccionales. La tesis privilegia mercados donde ya existe comportamiento de pago, movimiento de dinero y capilaridad operativa, mas que escala retail pura o sofisticacion bancaria estructural.


