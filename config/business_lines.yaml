        - bank_npl_ratio
        - country_risk_premium
        - inflation_rate
        - public_debt_gdp

    signal_logic: La atractividad para Bancos Digitales se concentra en mercados con escala retail, poblacion urbana, conectividad amplia, adopcion digital, bancarizacion suficiente y condiciones macro razonables para escalar una propuesta bancaria 100% digital. A diferencia de Pagos y Flujos, esta tesis no depende principalmente de remesas, comercio transfronterizo o canales fisicos de recaudo, sino de la posibilidad de escalar una base masiva de usuarios digitales en segmentos bancarizados, subatendidos o atendidos por estructuras bancarias tradicionales.


