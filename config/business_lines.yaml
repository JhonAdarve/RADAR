signal_thresholds:
  ALTA_OPORTUNIDAD: 0.70
  OPORTUNIDAD_MODERADA: 0.45
  BAJA_OPORTUNIDAD: 0.25

  risk_override:
    political_stability_percentile: 0.15
    control_of_corruption_percentile: 0.15
    country_risk_premium_percentile: 0.85
    bank_npl_ratio_percentile: 0.85