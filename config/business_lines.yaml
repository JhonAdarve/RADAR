        interest_rate_spread: 0.06
        bank_capital_rwa: 0.07
        bank_concentration_5: 0.03
        stock_market_cap_gdp: 0.03

        # Nota: ATMs y sucursales se tratan como infraestructura/canal,
        # por eso se ponderan en digital_tech, no en financial.

      institutional:
        regulatory_quality: 0.23
