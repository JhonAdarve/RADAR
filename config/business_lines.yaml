business_lines:

  IB:
    label: Intermediacion Bancaria
    description: Captacion, colocacion de credito y servicios bancarios tradicionales.
    weight_profile:
      macro: 0.20
      financial: 0.45
      institutional: 0.30
      digital_tech: 0.05

    variable_weight_overrides:
      macro:
        gdp_nominal: 0.10
        gdp_per_capita_ppp: 0.16
        # gdp_growth: 0.08
        inflation_rate: 0.14
        population_total: 0.07
        urban_population_pct: 0.04
        unemployment_rate: 0.08
        current_account_gdp: 0.06
        public_debt_gdp: 0.14
        trade_openness: 0.08
        fdi_net_inflows_gdp: 0.06
        weighted_mean_applied_tariff_all_products: 0.07

      financial:
        domestic_credit_private_gdp: 0.22
        financial_system_deposits_gdp: 0.20
        account_ownership: 0.12
        bank_npl_ratio: 0.14
        bank_capital_rwa: 0.12
        bank_concentration_5: 0.08
        interest_rate_spread: 0.08
        stock_market_cap_gdp: 0.03
        personal_remittances_gdp: 0.01

      institutional:
        rule_of_law: 0.23
        regulatory_quality: 0.21
        government_effectiveness: 0.17
        control_of_corruption: 0.15
        political_stability: 0.11
        country_risk_premium: 0.08
        heritage_efi: 0.03
        voice_accountability: 0.02

      digital_tech:
        secure_internet_servers_per_million: 0.24
        internet_users_pct: 0.22
        mobile_subscriptions: 0.18
        digital_payment_adults_pct: 0.16
        commercial_bank_branches_per_100k_adults: 0.08
        atms_per_100k_adults: 0.07
        ict_goods_exports_pct_total_goods_exports: 0.05

    key_variables:
      positive_signal:
        - domestic_credit_private_gdp
        - financial_system_deposits_gdp
        - account_ownership
        - bank_capital_rwa
        - regulatory_quality
        - rule_of_law
        - gdp_nominal
        - gdp_per_capita_ppp
        - interest_rate_spread

      negative_signal:
        - bank_npl_ratio
        - bank_concentration_5
        - country_risk_premium
        - inflation_rate
        - public_debt_gdp
        - weighted_mean_applied_tariff_all_products

    signal_logic: La atractividad para Intermediacion Bancaria depende principalmente de la profundidad y salud del sistema bancario domestico, la disponibilidad de fondeo, la calidad de cartera, la solvencia bancaria y un entorno macro-institucional estable. La tecnologia funciona como habilitador operativo, pero no como driver principal de entrada.


